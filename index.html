<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSET 3 · Study Companion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap');
:root{
  --bg:#0b0507;--surf:#160a0e;--card:#1e0f15;
  --b1:rgba(175,125,70,.14);--b2:rgba(175,125,70,.3);--b3:rgba(175,125,70,.5);
  --wine:#882030;--wine2:#aa2a40;--wine3:#cc3a55;
  --gold:#c09040;--gold2:#ddb860;--gold3:#f0d490;
  --cream:#f3e8db;--mist:#bfad98;--dim:#7a6555;--faint:#3a2520;
  --ok:#3a7040;--no:#882a2a;
  --r:3px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Source Serif 4',serif;background:var(--bg);color:var(--cream);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 8% 30%,rgba(136,32,48,.18) 0%,transparent 60%),
             radial-gradient(ellipse 40% 60% at 90% 75%,rgba(40,8,15,.3) 0%,transparent 60%);
  pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:0 16px 80px}

/* ── header ── */
header{text-align:center;padding:44px 0 18px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:.62rem;letter-spacing:.42em;color:var(--gold);opacity:.6;text-transform:uppercase;margin-bottom:12px}
h1{font-family:'Playfair Display',serif;font-size:clamp(2.6rem,6vw,4.8rem);font-weight:400;line-height:.95;color:var(--cream);letter-spacing:-.02em}
h1 em{color:var(--gold);font-style:italic}
.hsub{margin-top:10px;font-style:italic;font-size:.92rem;color:var(--mist);opacity:.62;letter-spacing:.06em}
.rule{display:flex;align-items:center;gap:12px;margin:22px 0}
.rule::before,.rule::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.18}
.rule span{color:var(--gold);font-size:10px;opacity:.5}

/* ── nav ── */
nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.nb{background:transparent;border:1px solid var(--b1);color:var(--mist);padding:8px 17px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.9rem;letter-spacing:.05em;border-radius:var(--r);transition:all .2s}
.nb:hover{border-color:var(--b2);color:var(--gold2)}
.nb.on{background:linear-gradient(135deg,var(--wine),#400a18);border-color:var(--wine2);color:var(--cream)}

/* ── panels ── */
.panel{display:none;animation:fu .28s ease}
.panel.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.glass{background:rgba(22,10,14,.74);backdrop-filter:blur(14px);border:1px solid var(--b1);border-radius:var(--r);padding:26px}
.ptitle{font-family:'Playfair Display',serif;font-size:1.45rem;font-style:italic;color:var(--gold2);margin-bottom:3px}
.pdesc{font-family:'JetBrains Mono',monospace;font-size:.66rem;letter-spacing:.06em;color:var(--dim);margin-bottom:18px}

/* ── shared ── */
.btn{background:var(--wine);border:none;color:var(--cream);padding:9px 19px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.92rem;letter-spacing:.04em;border-radius:var(--r);transition:background .18s;white-space:nowrap}
.btn:hover{background:var(--wine2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:transparent;border:1px solid var(--b2);color:var(--gold);padding:7px 15px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.86rem;border-radius:var(--r);transition:all .18s}
.btn-g:hover{background:rgba(192,144,64,.1)}
select,input,textarea{background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--cream);padding:8px 12px;font-family:'Source Serif 4',serif;font-size:.92rem;border-radius:var(--r);outline:none;transition:border-color .18s;width:100%}
select:focus,input:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--surf)}
.tag{background:var(--wine);color:var(--cream);padding:2px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:.65rem}
.tag-g{background:rgba(192,144,64,.12);color:var(--gold);padding:2px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:.65rem}
.tag-b{background:rgba(58,112,64,.14);color:#80c080;padding:2px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:.65rem}

/* ══════════ LEARN ══════════ */
.lnav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px}
.lnb{background:transparent;border:1px solid var(--b1);color:var(--mist);padding:7px 15px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.86rem;border-radius:var(--r);transition:all .18s}
.lnb:hover{border-color:var(--b2);color:var(--gold2)}
.lnb.on{background:rgba(192,144,64,.14);border-color:var(--gold);color:var(--gold2)}
.lsec{display:none}
.lsec.on{display:block}

/* topic grid */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:6px}
.tcard{background:rgba(255,255,255,.022);border:1px solid var(--b1);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.tcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--wine);transform:scaleY(0);transition:transform .22s;transform-origin:top}
.tcard:hover::before,.tcard.active::before{transform:scaleY(1)}
.tcard:hover,.tcard.active{border-color:rgba(136,32,48,.45);background:rgba(255,255,255,.038)}
.tc-fl{font-size:20px;margin-bottom:5px}
.tc-en{font-family:'Playfair Display',serif;font-size:.98rem;color:var(--gold2);margin-bottom:2px}
.tc-zh{font-size:.8rem;color:var(--mist);margin-bottom:7px}
.tc-tags{display:flex;flex-wrap:wrap;gap:3px}

/* detail panel */
.dsheet{display:none;margin-top:14px;background:rgba(0,0,0,.3);border:1px solid var(--b2);border-radius:var(--r);padding:22px;animation:fu .24s ease}
.dsheet.on{display:block}
.dsh-head{display:flex;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.dsh-left{display:flex;gap:12px;align-items:flex-start}
.dsh-fl{font-size:34px;line-height:1}
.dsh-en{font-family:'Playfair Display',serif;font-size:1.5rem;font-style:italic;color:var(--gold2);line-height:1}
.dsh-zh{font-size:.9rem;color:var(--mist);margin-top:3px}
.dsh-close{background:transparent;border:1px solid var(--b1);color:var(--dim);width:28px;height:28px;cursor:pointer;border-radius:50%;font-size:13px;transition:all .18s;flex-shrink:0}
.dsh-close:hover{border-color:var(--b2);color:var(--mist)}

/* kv table */
.kvt{width:100%;border-collapse:collapse;margin-bottom:14px}
.kvt tr{border-bottom:1px solid var(--b1)}
.kvt td:first-child{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;padding:9px 14px 9px 0;white-space:nowrap;opacity:.7;vertical-align:top;width:1%}
.kvt td:last-child{font-size:.88rem;line-height:1.72;color:var(--mist);padding:9px 0}

/* accordion */
.acc{margin-top:4px}
.acc-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:rgba(255,255,255,.028);border:1px solid var(--b1);border-radius:var(--r);cursor:pointer;transition:all .18s;user-select:none;margin-top:6px}
.acc-hd:hover{background:rgba(192,144,64,.07)}
.acc-hd span:first-child{font-size:.88rem;color:var(--cream)}
.acc-icon{color:var(--gold);font-size:.75rem;transition:transform .25s;flex-shrink:0}
.acc-icon.o{transform:rotate(90deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .38s ease}
.acc-body.o{max-height:2000px}
.acc-in{padding:13px;font-size:.87rem;line-height:1.78;color:var(--mist)}
.acc-in ul{padding-left:16px}
.acc-in li{margin-bottom:5px}
.acc-in strong{color:var(--cream)}
.acc-in ol{padding-left:16px}
.acc-in ol li{margin-bottom:6px}

/* search */
.sbar{margin-bottom:14px}

/* SAT visual */
.sat-spectrum{background:rgba(0,0,0,.2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:12px;overflow-x:auto}

/* ══════════ MAP ══════════ */
.map-chip{background:transparent;border:1px solid var(--b1);color:var(--mist);padding:5px 13px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.82rem;border-radius:var(--r);transition:all .18s}
.map-chip:hover{border-color:var(--b2);color:var(--gold2)}
.map-chip.on{background:rgba(192,144,64,.14);border-color:var(--gold);color:var(--gold2)}
.rpin{transition:opacity .2s}
.rpin.hidden{opacity:.15;pointer-events:none}
.rpin circle:first-child{transition:r .15s}
.rpin:hover circle:first-child{r:10}

/* ══════════ FLASHCARD ══════════ */
.fch{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.fch select{flex:1;min-width:160px}
.cshell{perspective:1400px;height:230px;cursor:pointer;margin-bottom:16px;user-select:none}
.crd{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .52s cubic-bezier(.4,0,.2,1)}
.crd.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 28px;text-align:center}
.front{background:linear-gradient(138deg,#260c12 0%,#140508 100%);border:1px solid rgba(192,144,64,.2)}
.back{background:linear-gradient(138deg,#1a1106 0%,#110d04 100%);border:1px solid rgba(192,144,64,.28);transform:rotateY(180deg)}
.flbl{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.35em;text-transform:uppercase;opacity:.38;margin-bottom:9px;color:var(--gold)}
.ftxt{font-size:1.05rem;line-height:1.65;color:var(--cream);font-style:italic}
.back .ftxt{color:#e6d0a0;font-style:normal}
.fhint{margin-top:11px;font-size:.65rem;opacity:.28;font-family:'JetBrains Mono',monospace}
.fctl{display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap}
.farr{background:transparent;border:1px solid var(--b1);color:var(--gold);width:35px;height:35px;border-radius:50%;cursor:pointer;font-size:.9rem;transition:all .18s}
.farr:hover{background:rgba(192,144,64,.1)}
.fcnt{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--dim)}
.fbar{flex:1;max-width:170px;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden}
.ffill{height:100%;background:linear-gradient(to right,var(--wine),var(--gold));transition:width .3s}

/* ══════════ QUIZ ══════════ */
.qmeta{display:flex;gap:13px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.qsc{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--dim)}
.pb{flex:1;height:2px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden}
.pbf{height:100%;background:linear-gradient(to right,var(--wine),var(--gold));transition:width .36s}
.qq{font-size:1.08rem;font-style:italic;line-height:1.65;padding:13px 15px;margin-bottom:14px;border-left:3px solid var(--wine);background:rgba(136,32,48,.07);border-radius:0 var(--r) var(--r) 0}
.qopts{display:grid;gap:7px;margin-bottom:12px}
.opt{background:rgba(255,255,255,.022);border:1px solid var(--b1);padding:11px 15px;cursor:pointer;font-family:'Source Serif 4',serif;font-size:.9rem;text-align:left;border-radius:var(--r);transition:all .18s;color:var(--cream);line-height:1.5}
.opt:hover:not(:disabled){border-color:var(--gold);background:rgba(192,144,64,.06)}
.opt.ok{background:rgba(58,112,64,.16);border-color:var(--ok);color:#9ad09a}
.opt.no{background:rgba(136,42,42,.16);border-color:var(--no);color:#d09090}
.opt:disabled{cursor:not-allowed}
.fb{padding:11px 15px;border-radius:var(--r);font-size:.88rem;line-height:1.7;margin-bottom:11px;display:none}
.fb.on{display:block}
.fb.ok{background:rgba(58,112,64,.1);border:1px solid var(--ok);color:#9ad09a}
.fb.no{background:rgba(136,42,42,.1);border:1px solid var(--no);color:#d09090}

/* ══════════ BLIND ══════════ */
.btg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.btlbl{font-family:'JetBrains Mono',monospace;font-size:.63rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);opacity:.62;margin-bottom:5px;display:block}
.btres{margin-top:16px;background:rgba(0,0,0,.22);border:1px solid var(--b1);border-radius:var(--r);padding:18px;display:none;animation:fu .26s ease}
.btres.on{display:block}
.btrt{font-family:'Playfair Display',serif;font-size:1.2rem;font-style:italic;color:var(--gold2);margin-bottom:9px}
.bttags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px}
.btbody{font-size:.88rem;line-height:1.78;color:var(--mist)}

@media(max-width:560px){
  .glass{padding:14px 11px}
  .btg{grid-template-columns:1fr}
  .tgrid{grid-template-columns:1fr 1fr}
  h1{font-size:2.5rem}
  .kvt td:first-child{white-space:normal}
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="eyebrow">WSET Level 3 · Wine Study Companion</div>
  <h1>Vino<em>Study</em></h1>
  <div class="hsub">系统学习 · 中英双语 · 边学边练</div>
</header>
<div class="rule"><span>◆</span></div>

<nav>
  <button class="nb on" onclick="tab('learn',this)">📖 系统学习</button>
  <button class="nb"    onclick="tab('map',this)">🗺️ 产区地图</button>
  <button class="nb"    onclick="tab('flash',this)">📚 闪卡</button>
  <button class="nb"    onclick="tab('quiz',this)">✏️ 模拟题</button>
  <button class="nb"    onclick="tab('blind',this)">🫙 盲品推断</button>
</nav>

<!-- ════════════════ LEARN ════════════════ -->
<div id="p-learn" class="panel glass on">
  <div class="ptitle">系统学习</div>
  <div class="pdesc">概览卡片 + 展开详细 · 中英双语关键术语 · 按考纲优先级排序</div>
  <div class="lnav">
    <button class="lnb on"  onclick="lsec('regions',this)">🗺️ 主要产区</button>
    <button class="lnb"     onclick="lsec('grapes',this)">🍇 葡萄品种</button>
    <button class="lnb"     onclick="lsec('sat',this)">📋 SAT品鉴</button>
    <button class="lnb"     onclick="lsec('winemaking',this)">⚗️ 酿造工艺</button>
  </div>

  <!-- REGIONS -->
  <div id="ls-regions" class="lsec on">
    <input class="sbar" id="rg-s" placeholder="搜索产区名、品种、关键词…" oninput="filterCards('rg')">
    <div class="tgrid" id="rg-grid"></div>
    <div class="dsheet" id="rg-sheet">
      <div class="dsh-head">
        <div class="dsh-left">
          <div class="dsh-fl" id="rg-fl"></div>
          <div><div class="dsh-en" id="rg-en"></div><div class="dsh-zh" id="rg-zh"></div></div>
        </div>
        <button class="dsh-close" onclick="closeSheet('rg-sheet','rg')">✕</button>
      </div>
      <table class="kvt" id="rg-kv"></table>
      <div class="acc" id="rg-acc"></div>
    </div>
  </div>

  <!-- GRAPES -->
  <div id="ls-grapes" class="lsec">
    <input class="sbar" id="gr-s" placeholder="搜索品种、风格、香气…" oninput="filterCards('gr')">
    <div class="tgrid" id="gr-grid"></div>
    <div class="dsheet" id="gr-sheet">
      <div class="dsh-head">
        <div class="dsh-left">
          <div class="dsh-fl" id="gr-fl"></div>
          <div><div class="dsh-en" id="gr-en"></div><div class="dsh-zh" id="gr-zh"></div></div>
        </div>
        <button class="dsh-close" onclick="closeSheet('gr-sheet','gr')">✕</button>
      </div>
      <table class="kvt" id="gr-kv"></table>
      <div class="acc" id="gr-acc"></div>
    </div>
  </div>

  <!-- SAT -->
  <div id="ls-sat" class="lsec">
    <div id="sat-content"></div>
  </div>

  <!-- WINEMAKING -->
  <div id="ls-winemaking" class="lsec">
    <div id="wm-content"></div>
  </div>
</div>

<!-- ════════════════ MAP ════════════════ -->
<div id="p-map" class="panel glass">
  <div class="ptitle">产区地图 Wine Region Map</div>
  <div class="pdesc">14个WSET 3核心产区 · 点击标记查看考点 · 对应品种与风格</div>

  <!-- region filter chips -->
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px" id="map-filters">
    <button class="map-chip on" onclick="filterMap('all',this)">全部</button>
    <button class="map-chip" onclick="filterMap('france',this)">🇫🇷 法国</button>
    <button class="map-chip" onclick="filterMap('europe',this)">🇮🇹🇩🇪🇪🇸🇵🇹 欧洲其他</button>
    <button class="map-chip" onclick="filterMap('newworld',this)">🌏 新世界</button>
  </div>

  <!-- map iframe via google maps embed -->
  <div id="map-container" style="border-radius:var(--r);overflow:hidden;border:1px solid var(--b2);margin-bottom:20px">
    <iframe id="gmap" 
      src="https://www.google.com/maps/d/embed?mid=1BNt5JZ3Q3Q3Q3Q3Q3Q3Q3Q3Q3Q3Q3Q0&ehbc=2E312F"
      style="display:none"></iframe>
    <!-- fallback: custom SVG world map with clickable dots -->
    <div id="map-svg-wrap" style="position:relative;background:rgba(0,0,0,.25);padding:8px;min-height:360px">
      <svg id="world-map" viewBox="0 0 900 460" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg">
        <!-- simplified continent outlines -->
        <!-- Europe -->
        <path d="M390,80 L430,70 L460,75 L470,90 L460,105 L440,110 L420,105 L400,100 L390,90 Z" fill="rgba(175,125,70,.12)" stroke="rgba(175,125,70,.3)" stroke-width="1"/>
        <!-- more Europe detail -->
        <path d="M395,90 L420,85 L445,88 L455,100 L450,115 L435,125 L415,120 L400,110 Z" fill="rgba(175,125,70,.1)" stroke="rgba(175,125,70,.2)" stroke-width="0.5"/>
        <!-- Iberia -->
        <path d="M380,100 L400,95 L405,110 L400,125 L385,125 L375,115 Z" fill="rgba(175,125,70,.12)" stroke="rgba(175,125,70,.3)" stroke-width="1"/>
        <!-- Italy boot -->
        <path d="M435,105 L445,100 L450,115 L448,135 L440,145 L432,140 L430,125 L432,112 Z" fill="rgba(175,125,70,.12)" stroke="rgba(175,125,70,.3)" stroke-width="1"/>
        <!-- North Africa -->
        <path d="M370,140 L500,135 L510,175 L370,180 Z" fill="rgba(100,80,50,.08)" stroke="rgba(100,80,50,.15)" stroke-width="0.5"/>
        <!-- Germany/Rhine -->
        <path d="M430,80 L455,75 L460,90 L450,95 L430,90 Z" fill="rgba(175,125,70,.1)" stroke="rgba(175,125,70,.2)" stroke-width="0.5"/>
        <!-- Portugal -->
        <path d="M375,100 L385,98 L387,112 L382,120 L375,116 Z" fill="rgba(175,125,70,.15)" stroke="rgba(175,125,70,.35)" stroke-width="1"/>

        <!-- Americas outline -->
        <path d="M160,60 L200,55 L210,80 L215,120 L205,160 L185,200 L175,240 L170,200 L155,160 L148,120 L150,80 Z" fill="rgba(175,125,70,.08)" stroke="rgba(175,125,70,.2)" stroke-width="0.5"/>
        <!-- South America -->
        <path d="M185,200 L220,195 L230,230 L225,280 L210,310 L195,300 L185,270 L182,230 Z" fill="rgba(175,125,70,.08)" stroke="rgba(175,125,70,.2)" stroke-width="0.5"/>

        <!-- Australia -->
        <path d="M680,260 L740,255 L755,285 L745,315 L710,325 L685,305 L675,280 Z" fill="rgba(175,125,70,.1)" stroke="rgba(175,125,70,.25)" stroke-width="0.8"/>
        <!-- New Zealand -->
        <path d="M760,295 L768,290 L772,308 L765,320 L758,315 Z" fill="rgba(175,125,70,.1)" stroke="rgba(175,125,70,.25)" stroke-width="0.8"/>

        <!-- grid lines -->
        <line x1="0" y1="230" x2="900" y2="230" stroke="rgba(175,125,70,.08)" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="450" y1="0" x2="450" y2="460" stroke="rgba(175,125,70,.08)" stroke-width="0.5" stroke-dasharray="4,4"/>
        <text x="452" y="228" fill="rgba(175,125,70,.2)" font-size="8" font-family="JetBrains Mono,monospace">EQUATOR</text>

        <!-- ── REGION DOTS ── -->

  {title:'葡萄酒缺陷 Wine Faults',
   svg:null,
   content:`<table class="kvt">
<tr><td>TCA软木塞污染 Corked</td><td>霉味/湿纸板/腐木；来自软木塞中真菌与含氯物反应产生2,4,6-三氯苯甲醚；遮盖所有果香；约5%天然软木塞可能受影响</td></tr>
<tr><td>氧化 Oxidation</td><td>过度O₂接触；棕色/铜色；蜂蜜/苹果酒/坚果；果香消失；口感扁平；白酒更明显</td></tr>
<tr><td>还原味 Reduction</td><td>缺乏O₂；臭鸡蛋（H₂S）/ 火柴 / 橡胶气味；醒酒后通常改善；螺旋盖酒更易出现</td></tr>
<tr><td>挥发酸 VA</td><td>醋酸菌（Acetobacter）；醋/指甲油去除剂（乙酸乙酯）；少量增加复杂度，过多为缺陷</td></tr>
<tr><td>再发酵 Refermentation</td><td>瓶中残糖+酵母；意外气泡/浑浊；非预期的起泡</td></tr>
<tr><td>热损 Heat Damage</td><td>高温储运；颜色变深；香气平坦；果香消失；可能出现"煮熟"感</td></tr></table>`},
];

// RENDER
// ══════════════════════════════════════════════
function tab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='flash')fcLoad();
}

function lsec(id,btn){
  document.querySelectorAll('.lsec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.lnb').forEach(b=>b.classList.remove('on'));
  document.getElementById('ls-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='regions')buildGrid(RG,'rg-grid','rg-sheet','rg-fl','rg-en','rg-zh','rg-kv','rg-acc','rg');
  if(id==='grapes') buildGrid(GR,'gr-grid','gr-sheet','gr-fl','gr-en','gr-zh','gr-kv','gr-acc','gr');
  if(id==='sat')    buildSAT();
  if(id==='winemaking') buildWM();
}

let currentOpen={rg:-1,gr:-1};

function buildGrid(data,gridId,sheetId,flId,enId,zhId,kvId,accId,prefix){
  const grid=document.getElementById(gridId);
  if(grid.children.length)return;
  grid.innerHTML=data.map((it,i)=>`
    <div class="tcard" id="${prefix}-card-${i}" onclick="showDetail(${i},'${sheetId}','${flId}','${enId}','${zhId}','${kvId}','${accId}','${prefix}')">
      <div class="tc-fl">${it.flag}</div>
      <div class="tc-en">${it.en}</div>
      <div class="tc-zh">${it.zh}</div>
      <div class="tc-tags">${it.tags.map(t=>`<span class="tag-g">${t}</span>`).join('')}</div>
    </div>`).join('');
}

function showDetail(i,sheetId,flId,enId,zhId,kvId,accId,prefix){
  const data=prefix==='rg'?RG:GR;
  const it=data[i];
  // update active card style
  document.querySelectorAll(`[id^="${prefix}-card-"]`).forEach(c=>c.classList.remove('active'));
  document.getElementById(`${prefix}-card-${i}`).classList.add('active');
  // fill content
  document.getElementById(flId).textContent=it.flag;
  document.getElementById(enId).textContent=it.en;
  document.getElementById(zhId).textContent=it.zh;
  const kvEl=document.getElementById(kvId);
  kvEl.innerHTML=it.kv.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
  const accEl=document.getElementById(accId);
  accEl.innerHTML=(it.acc||[]).map(a=>`
    <div class="acc-hd" onclick="toggleAcc(this)">
      <span>${a.t}</span><span class="acc-icon">▶</span>
    </div>
    <div class="acc-body"><div class="acc-in">${a.b}</div></div>`).join('');
  const sheet=document.getElementById(sheetId);
  sheet.classList.add('on');
  setTimeout(()=>sheet.scrollIntoView({behavior:'smooth',block:'nearest'}),40);
}

function toggleAcc(hd){
  hd.querySelector('.acc-icon').classList.toggle('o');
  hd.nextElementSibling.classList.toggle('o');
}

function closeSheet(sheetId,prefix){
  document.getElementById(sheetId).classList.remove('on');
  document.querySelectorAll(`[id^="${prefix}-card-"]`).forEach(c=>c.classList.remove('active'));
}

function filterCards(prefix){
  const q=document.getElementById(prefix+'-s').value.toLowerCase();
  const data=prefix==='rg'?RG:GR;
  document.querySelectorAll(`#${prefix}-grid .tcard`).forEach((el,i)=>{
    const it=data[i];
    const txt=[it.en,it.zh,...it.tags,...it.kv.map(k=>k.join(' '))].join(' ').toLowerCase();
    el.style.display=txt.includes(q)?'':'none';
  });
}

function buildSAT(){
  const el=document.getElementById('sat-content');
  if(el.children.length)return;
  el.innerHTML=SAT_SECTIONS.map(s=>`
    <div style="margin-bottom:16px">

function showMapCard(region) {
  const d = MAP_DATA[region];
  if (!d) return;
  document.getElementById('mc-title').textContent = d.title;
  document.getElementById('mc-sub').textContent = d.sub;
  document.getElementById('mc-tags').innerHTML = d.tags.map(t=>`<span class="tag-g">${t}</span>`).join('');
  document.getElementById('mc-kv').innerHTML = d.kv.map(([k,v])=>`
    <tr style="border-bottom:1px solid var(--b1)">
      <td style="font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--gold);opacity:.7;padding:8px 12px 8px 0;white-space:nowrap;vertical-align:top">${k}</td>
      <td style="font-size:.87rem;line-height:1.7;color:var(--mist);padding:8px 0">${v}</td>
    </tr>`).join('');
  document.getElementById('mc-exam').innerHTML = `<span style="color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:.68rem">EXAM</span><br>${d.exam}`;
  const card = document.getElementById('map-card');
  card.style.display = 'block';
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}

function filterMap(group, btn) {
  document.querySelectorAll('.map-chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.rpin').forEach(el=>{
    if (group === 'all') { el.classList.remove('hidden'); return; }
    const g = el.dataset.group;
    const show = (group === 'france' && g === 'france') ||
                 (group === 'europe' && g === 'europe') ||
                 (group === 'newworld' && g === 'newworld');
    el.classList.toggle('hidden', !show);
  });
}

    {q:'Ribera del Duero（杜罗河岸）与Rioja的核心区别？',a:'Ribera：DOCa，高海拔800-900m（更大日温差），Tinto Fino（Tempranillo当地名），风格更浓郁结构更强，单宁更多；Rioja：橡木桶风格更柔顺，美国橡木传统特色'},
    {q:'Port波特酒甜度原理？',a:'发酵进行到约酒精6-9%时（约4-6天），加入77% ABV葡萄烈酒（Aguardente）→酒精迅速升至约20%→超过酵母耐受极限→发酵立即中止→保留大量天然残糖'},
    {q:'Marlborough SB vs Sancerre SB：差异根本原因？',a:'气候：Marlborough（南纬41°，强日照+凉夜+大温差）→热带水果（百香果/芒果）；Sancerre（凉爽大陆性）→矿物/燧石/草本。两者均不MLF，差异来自气候和土壤'},
    {q:'Coonawarra（澳大利亚）赤土Terra Rossa的特殊性？',a:'红色石灰石土壤（表层薄，底层石灰岩），排水极好→强迫根系向深层扎→低产浓缩；赋予Cab.Sauv独特矿物/薄荷/黑醋栗风格；是澳大利亚最著名的地质标志之一'},
    {q:'Priorat（西班牙）为何产极浓缩葡萄酒？',a:'Llicorella板岩贫瘠土壤→极低产（产量可能仅几百克/株）；老藤Garnacha+Carignan根系深扎板岩；地中海+大陆性气候→高成熟度；是西班牙唯二DOCa（另为Rioja）'},
    {q:'Alsace：为何是法国"最德国风"的产区？',a:'历史：1871-1919年和1940-1944年属德国统治→保留德式文化；以品种名标注酒标（法国少见）；德式细长瓶；Vosges山脉保护→法国最干燥产区；允许VT/SGN甜酒等级'},
    {q:'Central Otago（新西兰）为何适合Pinot Noir？',a:'全球最南端商业产区（南纬45°）；大陆性气候→大日温差→香气保留+高酸度；较强日照→足够成熟度；风格浓郁，比勃艮第酒体更饱满，单宁更成熟'},
    {q:'Tawny Port vs Ruby Port：陈年方式的根本区别？',a:'Ruby：不锈钢/大容器陈年→减少氧化→保留年轻鲜果香（黑果/巧克力）；Tawny：小橡木桶陈年→氧化→颜色变棕，坚果/太妃糖/干果香气，标注年龄（10/20/30/40年）'},
    {q:'Sauternes：Botrytis贵腐形成的唯一条件？',a:'特定微气候：Ciron河（凉爽水源）流入温暖Garonne河→早晨晨雾潮湿（促进Botrytis生长穿透果皮）+下午阳光干燥（防腐烂，使水分蒸发浓缩）。这一地理特征不可复制'},
    {q:'GSM混酿（南隆河）：三种品种各自贡献？',a:'Grenache：红色浆果/白胡椒/高酒精/低单宁（主角，提供果味酒精）；Syrah：深色/单宁/结构（补颜色单宁）；Mourvèdre：肉感/皮革/结构（增复杂度和陈年潜力）'},

  winemaking:[

    {q:'传统法中"转瓶Riddling"的目的？',a:'将二次发酵后的死酵母沉淀（Lees）逐渐从瓶底转移至瓶颈，以便除渣。手工转瓶需6-8周；机械陀螺仪Gyropalette仅需1周。沉淀不转移就无法干净除渣'},
    {q:'美国橡木 vs 法国橡木的识别香气？',a:'美国橡木（Q.Alba）：椰子 Coconut、甜香草 Sweet Vanilla、奶油糖；法国橡木（Q.Petraea）：细腻香料 Spice、烘烤 Toast、坚果。"椰子=美国橡木"是盲品中最可靠的橡木判断依据'},
    {q:'贵腐 Noble Rot vs 灰腐 Grey Rot：同菌为何结果不同？',a:'贵腐：早晨潮湿（菌生长穿透皮）+下午干燥（蒸发浓缩）→高品质甜酒；灰腐：持续潮湿→菌大量繁殖腐烂→破坏品质。同一种Botrytis Cinerea菌，微气候决定一切'},
    {q:'Carbonic Maceration（CM）：胞内发酵的特点？',a:'整串葡萄置CO₂环境，葡萄内部进行无酵母胞内发酵→绕过皮汁接触→极少单宁/颜色浅/草莓-香蕉酯香/轻盈。Beaujolais Nouveau标准做法'},
    {q:'Sur Lie酒泥陈酿：自溶产生哪些变化？',a:'死酵母细胞自溶（Autolysis）→①面包/饼干/酵母香气（二类） ②甘露蛋白增加口感质感 ③消耗O₂保护酒不氧化。Champagne陈年依赖此过程，Muscadet Sur Lie必须标注'},
    {q:'冷浸皮（Cold Soak）的目的？',a:'低温（约10-15°C）下浸皮→花青素（颜色）提取，但单宁提取受温度抑制→获得深颜色+低单宁的平衡效果。Pinot Noir常用（需要颜色但单宁应细腻）'},
    {q:'冷稳定（Cold Stabilisation）处理什么问题？',a:'将酒冷却至接近冰点（约-4°C），使酒石酸钾/钙结晶析出后过滤；防止瓶中出现无害白色结晶（消费者可能误认为杂质/糖）。属于稳定化处理，不影响质量'},
    {q:'整串发酵（Whole Cluster）的利弊？',a:'利：增加香料复杂度/不同质感单宁/略降酒精；弊：梗不成熟→绿色/草本/苦味。关键：梗的Stem Ripeness成熟度；勃艮第顶级酒庄和部分北隆河Syrah使用'},
    {q:'加强酒（Port）中止发酵的机制？',a:'发酵进行至约6-9%酒精时加入77% ABV葡萄烈酒→混合酒精迅速升至约20%→超过酵母耐受上限（约15-17%）→发酵立即停止→保留天然残糖'},

  sat:[

    {q:'SAT质量评估：Outstanding级需满足哪些条件？',a:'所有五维度卓越：①高浓郁度 Pronounced Intensity ②多层复杂度（三类香气均有）③极高典型性 ④完美平衡（无突兀要素）⑤超长余味（Long，>10秒）'},
    {q:'余味长度的量化标准？',a:'Short <3秒 / M- 3-5秒 / M 5-7秒 / M+ 7-10秒 / Long >10秒。是感受到具体风味消退的时间，不是口腔空感时间。高质量酒余味越长'},
    {q:'高酸葡萄酒陈年潜力更强的三个原因？',a:'①低pH抑制细菌/微生物（天然防腐） ②保护花青素颜色稳定（不褪色） ③装瓶时使SO₂抗氧化效果更强。Riesling/Chenin Blanc高酸→数十年潜力'},
    {q:'品鉴白葡萄酒时，颜色偏金黄/琥珀的可能原因？',a:'①橡木桶发酵/熟化 ②氧化 ③甜酒/贵腐酒 ④陈年 ⑤皮肤接触（Orange Wine）。需结合香气综合判断，颜色深≠必然有橡木'},
    {q:'TCA软木塞污染：特征、原因、解决？',a:'特征：霉味/湿纸板/腐木气味，遮盖所有果香，口感扁平。原因：软木塞中真菌与含氯化合物（消毒剂）反应→2,4,6-三氯苯甲醚。解决：DIAM技术塞/螺旋盖/玻璃塞'},
    {q:'品鉴中"平衡Balance"具体指什么？',a:'果味/酸度/单宁/酒精/甜度相互协调，无任何一项突兀凸出。高质量酒：高单宁需足够果味支撑；高酸需果味或甜度平衡；高酒精需丰满果味对应。不平衡是品质扣分项'},

    {q:'老年份红酒醒酒的5个注意点？',a:'①提前直立静置（沉淀沉底）②瓶颈置光源前缓慢倾倒（见沉淀立即停）③时间不宜过长（30-60分钟）④不需大量空气接触（老酒脆弱）⑤宽口醒酒器增加适度接触'},
    {q:'葡萄酒储存的5个核心条件？',a:'①温度12-14°C恒定（稳定比绝对温度更重要）②湿度70-80%（防软木塞干燥收缩）③黑暗（UV破坏单宁和颜色）④水平存放（保持软木塞湿润）⑤远离震动和异味'},
    {q:'还原味（Reduction）如何识别和处理？',a:'识别：臭鸡蛋（H₂S）/ 火柴 / 橡胶气味。原因：缺乏O₂接触（常见于螺旋盖或密封不锈钢罐）。处理：醒酒或用力旋转杯子增加O₂接触，通常可改善甚至消失'},
    {q:'螺旋盖 vs 软木塞：各自的优劣势？',a:'软木塞：传统，微量O₂渗入（有利陈年），但TCA风险约5%；螺旋盖：无TCA，完全密封（可能导致还原味），适合即饮型；DIAM技术塞：无TCA+可控氧气透过率，越来越多高端酒采用'},
  ]
};

let fcData=[],fcIdx=0,fcFlipped=false;
function fcLoad(){
  const cat=document.getElementById('fc-cat').value;
  fcData=[...CARDS[cat]];fcIdx=0;fcFlipped=false;fcShow();
}
function fcShuffle(){
  for(let i=fcData.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcData[i],fcData[j]]=[fcData[j],fcData[i]];}
  fcIdx=0;fcFlipped=false;fcShow();
}
function fcShow(){
  const c=fcData[fcIdx];
  document.getElementById('fc-q').textContent=c.q;
  document.getElementById('fc-a').textContent=c.a;
  document.getElementById('fcnt').textContent=`${fcIdx+1} / ${fcData.length}`;
  document.getElementById('ffill').style.width=`${((fcIdx+1)/fcData.length)*100}%`;
  document.getElementById('fc-crd').classList.remove('flip');fcFlipped=false;
}
function fcFlip(){const el=document.getElementById('fc-crd');fcFlipped=!fcFlipped;el.classList.toggle('flip',fcFlipped);}
function fcNext(){fcIdx=(fcIdx+1)%fcData.length;fcShow();}
function fcPrev(){fcIdx=(fcIdx-1+fcData.length)%fcData.length;fcShow();}

let qScore=0,qTotal=0,qPool=[],qIdx=0;
function qzStart(){
  const cat=document.getElementById('qcat').value;
  qPool=cat==='all'?[...QB]:QB.filter(q=>q.cat===cat);
  qPool.sort(()=>Math.random()-.5);
  qIdx=0;qScore=0;qTotal=0;
  updateQMeta();qzRender();
}
function qzRender(){
  if(qIdx>=qPool.length){
    document.getElementById('qarea').innerHTML=`
      <div style="text-align:center;padding:34px 0">
        <div style="font-size:2rem;margin-bottom:9px">🎉</div>
        <div style="font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--gold2);margin-bottom:6px">本轮完成！</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--mist);margin-bottom:20px">正确 ${qScore} / ${qTotal} · 正确率 ${Math.round(qScore/qTotal*100)}%</div>
        <button class="btn" onclick="qzStart()">再来一轮</button>
      </div>`;return;
  }
  const q=qPool[qIdx];
  document.getElementById('qarea').innerHTML=`
    <div class="qq">${q.q}</div>
    <div class="qopts">${q.opts.map((o,i)=>`<button class="opt" onclick="qzAns(${i})">${o}</button>`).join('')}</div>
    <div class="fb" id="qfb"></div>
    <div id="qnxt" style="display:none;text-align:center;margin-top:4px"><button class="btn" onclick="qzNext()">下一题 →</button></div>`;
}
function qzAns(i){
  const q=qPool[qIdx];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.querySelectorAll('.opt')[q.ans].classList.add('ok');
  if(i!==q.ans)document.querySelectorAll('.opt')[i].classList.add('no');
  if(i===q.ans)qScore++;
  qTotal++;
  const fb=document.getElementById('qfb');
  fb.className=`fb on ${i===q.ans?'ok':'no'}`;
  fb.innerHTML=`<strong>${i===q.ans?'✓ 正确！':'✗ 错误'}</strong><br>${q.exp}`;
  document.getElementById('qnxt').style.display='block';
  updateQMeta();
}
function qzNext(){qIdx++;qzRender();updateQMeta();}
function updateQMeta(){
  document.getElementById('qsc').textContent=qTotal>0?`正确率 ${Math.round(qScore/qTotal*100)}% (${qScore}/${qTotal})`:'正确率 —';
  document.getElementById('qpb').style.width=`${(qIdx/(qPool.length||1))*100}%`;
}

// ══ BLIND — 本地推断引擎（无需API）══
function gm(id){return[...document.getElementById(id).selectedOptions].map(o=>o.value).filter(v=>v);}

// 推断规则库
const BLIND_RULES = [
  // ── 白葡萄酒 ──
  {grape:'Riesling 雷司令',region:'Mosel / Alsace / Clare Valley',confidence:'高',
   match(c,ar,st,n){return c.includes('柠檬')||c.includes('Lemon')||ar.includes('柑橘 Citrus')&&st.includes('高酸 High Acidity')&&(st.includes('中低酒精 Low-Med Alcohol')||n.includes('矿物')||n.includes('汽油'));},
   reason:'柠檬黄色 + 高酸 + 中低酒精 → 强烈指向凉爽气候高酸白葡萄品种。Riesling是最典型选择：凉爽气候保留极高酸度，Mosel酒精仅7-9%；若有矿物感或汽油陈年香则更确定。'},
  {grape:'Sauvignon Blanc 长相思',region:'Marlborough / Sancerre',confidence:'高',
   match(c,ar,st,n){return (ar.includes('草本/青椒 Herbaceous')||ar.includes('热带水果 Tropical Fruit'))&&st.includes('高酸 High Acidity')&&!st.includes('高单宁 High Tannin');},
   reason:'草本/青椒或热带水果 + 高酸 + 无单宁 → SB的经典指纹。Marlborough：百香果+青椒+强烈；Sancerre：燧石矿物+草本+精致。两者均不进行MLF。'},
  {grape:'Chardonnay 霞多丽',region:'Chablis / Côte de Beaune / Napa',confidence:'中',
   match(c,ar,st,n){return (c.includes('金黄')||c.includes('Gold'))&&(ar.includes('核果 Stone Fruit')||n.includes('奶油')||n.includes('橡木'))&&!st.includes('高单宁 High Tannin');},
   reason:'金黄色 + 核果/奶油/橡木香气 + 无单宁 → 典型桶发酵Chardonnay。Chablis无橡木更清瘦；Côte de Beaune带桶有奶油榛子；Napa更丰满高酒精。'},
  {grape:'Chenin Blanc 白诗南',region:'Vouvray / Savennières (Loire)',confidence:'中',
   match(c,ar,st,n){return st.includes('高酸 High Acidity')&&(st.includes('明显甜度 Sweetness')||n.includes('蜂蜡')||n.includes('蜂蜜'))&&!ar.includes('草本/青椒 Herbaceous');},
   reason:'高酸 + 甜度/蜂蜡感 → Chenin Blanc的独特组合。高酸是其能跨越干型到极甜所有风格的基础，即使甜型也保持清爽感。Loire Valley最典型。'},
  {grape:'Gewurztraminer 琼瑶浆',region:'Alsace',confidence:'高',
   match(c,ar,st,n){return ar.includes('花香 Floral')&&st.includes('低酸 Low Acidity')&&(n.includes('荔枝')||n.includes('玫瑰'));},
   reason:'浓烈花香 + 低酸 → 强烈指向Gewurztraminer。荔枝/玫瑰/土耳其软糖是标志性香气，天然低酸，Alsace最典型。注意：浓花香≠甜型，Alsace通常酿干型。'},
  {grape:'Viognier 维欧尼',region:'Condrieu / Northern Rhône',confidence:'中',
   match(c,ar,st,n){return ar.includes('花香 Floral')&&(ar.includes('核果 Stone Fruit'))&&st.includes('低酸 Low Acidity')&&st.includes('丰满酒体 Full Body');},
   reason:'浓烈花香（金银花/杏桃）+ 核果 + 低酸 + 丰满酒体 → Viognier特征组合。与Gewurztraminer区别：核果感更多，荔枝/玫瑰感较少。Condrieu是标杆产区。'},

  // ── 红葡萄酒 ──
  {grape:'Pinot Noir 黑皮诺',region:'Burgundy / Oregon / Central Otago',confidence:'高',
   match(c,ar,st,n){return (c.includes('浅红宝石')||c.includes('Pale Ruby'))&&ar.includes('红色浆果 Red Berry')&&st.includes('高酸 High Acidity')&&(st.includes('低单宁 Low Tannin')||st.includes('中单宁 Medium Tannin'))&&st.includes('轻盈酒体 Light Body');},
   reason:'浅红宝石色 + 红色浆果 + 高酸 + 低/中单宁 + 轻盈酒体 → Pinot Noir的经典画像。皮薄→颜色浅/低单宁；凉爽气候保留高酸。勃艮第加蘑菇/腐叶感则更确定。'},
  {grape:'Grenache 歌海娜',region:'Châteauneuf-du-Pape / Priorat',confidence:'高',
   match(c,ar,st,n){return ar.includes('红色浆果 Red Berry')&&st.includes('高酒精 High Alcohol')&&st.includes('低单宁 Low Tannin')&&(ar.includes('辛香料 Spice')||n.includes('白胡椒')||n.includes('甘草'));},
   reason:'红色浆果 + 高酒精 + 低单宁 + 白胡椒/甘草 → Grenache的结构特征（高糖天然高酒精，皮薄低单宁）。南隆河/Priorat最典型。'},
  {grape:'Syrah / Shiraz 西拉',region:'Northern Rhône / Barossa Valley',confidence:'高',
   match(c,ar,st,n){return (ar.includes('黑色浆果 Black Fruit')||ar.includes('烟熏/橄榄 Smoky/Olive'))&&(ar.includes('黑胡椒 Black Pepper')||n.includes('黑胡椒'))&&!st.includes('低单宁 Low Tannin');},
   reason:'黑胡椒 + 黑色浆果/烟熏 → Syrah最标志性特征（Rotundone产生黑胡椒）。北隆河：中等酒体/优雅；Barossa：丰满/高酒精/果酱感。两者风格差异大但品种特征相同。'},
  {grape:'Cabernet Sauvignon 赤霞珠',region:'Bordeaux Left Bank / Napa Valley',confidence:'高',
   match(c,ar,st,n){return (c.includes('深红宝石')||c.includes('Deep Ruby'))&&ar.includes('黑色浆果 Black Fruit')&&st.includes('高单宁 High Tannin')&&st.includes('高酸 High Acidity')&&st.includes('高酒精 High Alcohol');},
   reason:'深色 + 黑色浆果 + 高单宁/高酸/高酒精 → 赤霞珠的"三高"结构。厚皮品种，深色，需充足热量成熟。波尔多更含蓄矿物；Napa更果酱丰满。'},
  {grape:'Merlot 梅洛',region:'Bordeaux Right Bank / Pomerol',confidence:'中',
   match(c,ar,st,n){return ar.includes('黑色浆果 Black Fruit')&&st.includes('中单宁 Medium Tannin')&&st.includes('中酸 Medium Acidity')&&st.includes('丰满酒体 Full Body');},
   reason:'黑色浆果（李子/黑樱桃）+ 中等单宁/酸度 + 丰满酒体 → Merlot比Cab.Sauv更柔和。波尔多右岸黏土土壤保水→Merlot天然选择。'},
  {grape:'Nebbiolo 内比奥罗',region:'Barolo / Barbaresco (Piedmont)',confidence:'高',
   match(c,ar,st,n){return (c.includes('石榴红')||c.includes('Garnet')||c.includes('砖红'))&&st.includes('高单宁 High Tannin')&&st.includes('高酸 High Acidity')&&(ar.includes('花香 Floral')||n.includes('玫瑰')||n.includes('焦油'));},
   reason:'石榴红/砖红色（浅）+ 高单宁/高酸 + 玫瑰/焦油 → Nebbiolo的经典悖论：颜色浅但结构极强。"玫瑰与焦油"是Barolo标志性描述。这种颜色浅≠结构弱的反差是高频考点。'},
  {grape:'Tempranillo 丹魄',region:'Rioja / Ribera del Duero',confidence:'中',
   match(c,ar,st,n){return ar.includes('红色浆果 Red Berry')&&(ar.includes('橡木/香草 Oak/Vanilla')||n.includes('香草')||n.includes('椰子'))&&st.includes('中单宁 Medium Tannin');},
   reason:'红色浆果 + 橡木香草/椰子（美国橡木特征）+ 中等单宁 → Tempranillo + 传统Rioja美国橡木熟化。椰子味是最直接的美国橡木识别标志。'},
  {grape:'Malbec 马尔贝克',region:'Mendoza (Argentina)',confidence:'高',
   match(c,ar,st,n){return (c.includes('深红宝石')||c.includes('Deep Ruby'))&&ar.includes('黑色浆果 Black Fruit')&&st.includes('高酒精 High Alcohol')&&st.includes('中单宁 Medium Tannin')&&(n.includes('紫罗兰')||n.includes('蓝莓'));},
   reason:'深色 + 黑色浆果(蓝莓/紫罗兰) + 高酒精 + 成熟圆润单宁 → 阿根廷Malbec。高海拔大日温差产生的高酒精+保留酸度是Mendoza的标志。'},
  {grape:'Sangiovese 桑娇维塞',region:'Chianti Classico / Brunello (Tuscany)',confidence:'中',
   match(c,ar,st,n){return ar.includes('红色浆果 Red Berry')&&st.includes('高酸 High Acidity')&&st.includes('高单宁 High Tannin')&&(n.includes('樱桃')||n.includes('番茄')||n.includes('皮革'));},
   reason:'红色浆果（酸樱桃）+ 高酸/高单宁 + 皮革/番茄感 → Sangiovese。高酸+高单宁是意大利红葡萄的典型组合；番茄/皮革是品种识别香气。'},
];

function runBlind() {
  const col = document.getElementById('bt-col').value;
  const intensity = document.getElementById('bt-int').value;
  const ar = gm('bt-ar');
  const st = gm('bt-st');
  const notes = document.getElementById('bt-notes').value.trim().toLowerCase();

  if (!col && !ar.length && !st.length) { alert('请至少选择颜色或香气特征'); return; }

  // 判断红/白/桃红
  const isRed = col.includes('红宝石')||col.includes('Ruby')||col.includes('石榴')||col.includes('Garnet')||col.includes('砖红')||col.includes('Tawny');
  const isWhite = col.includes('柠檬')||col.includes('Lemon')||col.includes('金黄')||col.includes('Gold')||col.includes('琥珀')||col.includes('Amber');
  const isRose = col.includes('粉红')||col.includes('Pink')||col.includes('Salmon');

  // 匹配得分
  const scores = BLIND_RULES.map(rule => {
    let score = 0;
    if (rule.match(col, ar, st, notes)) score += 10;
    // 额外细节匹配
    if (isRed && (rule.grape.includes('Noir')||rule.grape.includes('Syrah')||rule.grape.includes('Sauv')||rule.grape.includes('Nebb')||rule.grape.includes('Temp')||rule.grape.includes('Malbec')||rule.grape.includes('Merlot')||rule.grape.includes('Gren')||rule.grape.includes('Sangio'))) score += 2;
    if (isWhite && (rule.grape.includes('Chardonnay')||rule.grape.includes('Riesling')||rule.grape.includes('Sauv')||rule.grape.includes('Chenin')||rule.grape.includes('Viog')||rule.grape.includes('Gewurz'))) score += 2;
    return { rule, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score);

  const btn = document.getElementById('btbtn');
  const res = document.getElementById('btres');

  if (!scores.length) {
    document.getElementById('btrt').textContent = '特征不足，无法推断';
    document.getElementById('bttags').innerHTML = '';
    document.getElementById('btbody').textContent = '请选择更多特征（至少包含颜色 + 1个香气或结构特征）来获得推断结果。';
    res.classList.add('on'); return;
  }

  const top = scores[0].rule;
  const alts = scores.slice(1,3).map(x => x.rule.grape.split(' ')[0]);

  document.getElementById('btrt').textContent = `${top.grape} · ${top.region}`;
  document.getElementById('bttags').innerHTML =
    `<span class="tag">${top.grape}</span>` +
    `<span class="tag">${top.region}</span>` +
    `<span class="tag">把握：${top.confidence}</span>` +
    alts.map(a=>`<span class="tag-g">备选：${a}</span>`).join('');
  document.getElementById('btbody').innerHTML =
    `<strong style="color:var(--cream)">推断逻辑：</strong><br>${top.reason}` +
    (alts.length ? `<br><br><span style="color:var(--dim);font-size:.82rem">备选原因：选择了部分但不完全符合主推断的特征，${alts.join('、')}也有可能，需结合更多细节排除。</span>` : '');
  res.classList.add('on');
  setTimeout(()=>res.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
</script>
